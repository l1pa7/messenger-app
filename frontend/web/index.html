<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Messenger — быстрый и безопасный мессенджер">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Messenger">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#090A13">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- iOS иконка на экране "Домой" -->
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <title>Messenger</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body { background: #090A13; margin: 0; }
    #loading {
      position: fixed; inset: 0; background: #090A13;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
    }
    .logo {
      width: 72px; height: 72px; border-radius: 20px;
      background: linear-gradient(145deg, #6C5CE7, #9B8CFF);
      display: flex; align-items: center; justify-content: center;
      font-size: 38px;
    }
    .spinner {
      width: 28px; height: 28px; border: 2px solid #2A2B3D;
      border-top-color: #7C6EFA; border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo">⚡</div>
    <div class="spinner"></div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', () => {
      document.getElementById('loading').remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
